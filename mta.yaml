_schema-version: '3.1'
ID: earmms-sf
version: 1.0.0
description: EARMMS SuccessFactors Master Data Service

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: earmms-sf-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    requires:
      - name: earmms-sf-hdi
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  - name: earmms-sf-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      ignore:
        - node_modules/
    requires:
      - name: earmms-sf-hdi

resources:
  - name: earmms-sf-hdi
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
